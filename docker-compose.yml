services:
  fetch-schedules:
    build: .
    container_name: fetch-schedules
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/var/log
    environment:
      - TZ=Europe/Paris

  flask-app:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: flask-app
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./templates:/app/templates
    ports:
      - "5000:5000"
    environment:
      - TZ=Europe/Paris
