{% extends "base.html" %}

{% block content %}
<!-- Date Filter Section -->
<div class="date-filter-section" style="margin-bottom: 20px; padding: 15px; background-color: var(--color-stat-box-bg); border-radius: 5px; border: 1px solid var(--color-border);">
  <h3 style="margin-top: 0; color: var(--color-text);">Filtre par date</h3>
  <div style="display: flex; flex-wrap: wrap; gap: 15px; align-items: center;">
    <div style="display: flex; flex-direction: column; gap: 5px;">
      <label for="start-date" style="font-weight: bold; color: var(--color-text);">Date de début:</label>
      <input type="date" id="start-date" style="padding: 8px; border-radius: 4px; border: 1px solid var(--color-border); background-color: var(--color-background); color: var(--color-text);" lang="fr">
    </div>
    <div style="display: flex; flex-direction: column; gap: 5px;">
      <label for="end-date" style="font-weight: bold; color: var(--color-text);">Date de fin:</label>
      <input type="date" id="end-date" style="padding: 8px; border-radius: 4px; border: 1px solid var(--color-border); background-color: var(--color-background); color: var(--color-text);" lang="fr">
    </div>
    <div style="display: flex; flex-direction: column; gap: 5px; justify-content: flex-end;">
      <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button id="preset-week" style="padding: 8px 12px; background-color: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;">Semaine</button>
        <button id="preset-month" style="padding: 8px 12px; background-color: #9C27B0; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;">Mois</button>
        <button id="preset-all" style="padding: 8px 12px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;">Tout</button>
      </div>
    </div>
  </div>
</div>

<div id="stats"></div>
<div id="line-stats" style="margin-top: 40px;"></div>
<div id="timestamp" class="timestamp"></div>
{% endblock %}

{% block scripts %}
<script src="/static/statistiques_script.js"></script>
{% endblock %}
