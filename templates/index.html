<!doctype html>
<html>
  <head>
    <title>Veuillez nous excuser pour la gêne occasionnée</title>
    <link rel="icon" href="/static/ter.png" type="image/png" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      h1 {
        color: #333;
      }
      .stats-container {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
      }
      .stat-box {
        border: 1px solid #ddd;
        padding: 15px;
        border-radius: 5px;
        flex: 1;
      }
      .stat-box h3 {
        margin-top: 0;
      }
      .stat-value {
        font-size: 24px;
        font-weight: bold;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }
      th {
        background-color: #f2f2f2;
      }
      tr:nth-child(even) {
        background-color: #f9f9f9;
      }
      .header-with-logo {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
      }
      .ter-logo {
        height: 60px;
      }

    </style>
  </head>
  <body>
    <div class="header-with-logo">
      <img src="/static/ter.png" alt="TER HDF Logo" class="ter-logo" />
      <div>
        <h1>Veuillez nous excuser pour la gêne occasionnée</h1>
        <p>
          <i
            >Analyse des retards de trains sur les lignes TER HDF Compiègne ↔
            Paris Gare du Nord</i
          >
        </p>
      </div>
    </div>

    <div id="stats"></div>
    <div id="line-stats"></div>
    <div
      id="timestamp"
      style="margin-top: 20px; font-size: 14px; color: #666"
    ></div>

    <script>
      async function loadStats() {
        try {
          const response = await fetch("/api/stats");
          const stats = await response.json();

          let html = "<h2>Statistiques globales</h2>";
          html += '<div class="stats-container">';
          html += `<div class="stat-box">
                    <h3>Total des trains</h3>
                    <div class="stat-value">${stats.total_trains}</div>
                </div>`;
          html += `<div class="stat-box">
                    <h3>À l'heure</h3>
                    <div class="stat-value">${stats.on_time} (${stats.on_time_percentage.toFixed(1)}%)</div>
                </div>`;
          html += `<div class="stat-box">
                    <h3>≤5 min de retard</h3>
                    <div class="stat-value">${stats.delay_5min} (${stats.delay_5min_percentage.toFixed(1)}%)</div>
                </div>`;
          html += `<div class="stat-box">
                    <h3>≤15 min de retard</h3>
                    <div class="stat-value">${stats.delay_15min} (${stats.delay_15min_percentage.toFixed(1)}%)</div>
                </div>`;
          html += `<div class="stat-box">
                    <h3>≤45 min de retard</h3>
                    <div class="stat-value">${stats.delay_45min} (${stats.delay_45min_percentage.toFixed(1)}%)</div>
                </div>`;
          html += `<div class="stat-box">
                    <h3>>45 min de retard</h3>
                    <div class="stat-value">${stats.delay_over_45min} (${stats.delay_over_45min_percentage.toFixed(1)}%)</div>
                </div>`;
          html += "</div>";

          document.getElementById("stats").innerHTML = html;
        } catch (error) {
          console.error("Erreur lors du chargement des statistiques:", error);
        }
      }

      function generateTableHTML(stats, title) {
        let html = `<h3>${title}</h3>`;
        html += "<table>";
        html +=
          "<tr><th>Ligne de train</th><th>Départ</th><th>Total</th><th>À l'heure</th><th>≤5 min</th><th>≤15 min</th><th>≤45 min</th><th>>45 min</th><th>Retard moyen</th><th>Visualisation</th></tr>";

        stats.forEach((stat) => {
          html += `<tr>
                      <td>${stat.line}</td>
                      <td>${stat.departure_time}</td>
                      <td>${stat.total_trains}</td>
                      <td>${stat.on_time} (${stat.on_time_percentage.toFixed(1)}%)</td>
                      <td>${stat.delay_5min} (${stat.delay_5min_percentage.toFixed(1)}%)</td>
                      <td>${stat.delay_15min} (${stat.delay_15min_percentage.toFixed(1)}%)</td>
                      <td>${stat.delay_45min} (${stat.delay_45min_percentage.toFixed(1)}%)</td>
                      <td>${stat.delay_over_45min} (${stat.delay_over_45min_percentage.toFixed(1)}%)</td>
                      <td>${stat.average_delay_minutes.toFixed(1)} min</td>
                      <td>${generateInlineChartHTML(stat)}</td>
                  </tr>`;
        });

        html += "</table>";
        
        // Add legend below the table
        html += '<div class="chart-legend" style="margin-top: 10px; font-size: 12px;">';
        html += '<strong>Légende:</strong> ';
        html += '<span style="color: #4CAF50;">■ À l\'heure</span> | ';
        html += '<span style="color: #8BC34A;">■ ≤5 min</span> | ';
        html += '<span style="color: #FFEB3B;">■ ≤15 min</span> | ';
        html += '<span style="color: #FF9800;">■ ≤45 min</span> | ';
        html += '<span style="color: #F44336;">■ >45 min</span>';
        html += '</div>';
        
        return html;
      }

      function generateInlineChartHTML(stat) {
        const total = stat.total_trains;
        if (total === 0) return '';
        
        let html = '<div style="width: 150px; height: 15px; position: relative; border: 1px solid #eee; border-radius: 3px; overflow: hidden;">';
        
        // On time segment
        if (stat.on_time > 0) {
            const width = (stat.on_time / total * 100).toFixed(1);
            html += `<div style="width: ${width}%; height: 100%; background-color: #4CAF50; float: left;" title="À l'heure: ${stat.on_time} (${stat.on_time_percentage.toFixed(1)}%)"></div>`;
        }
        
        // 0-5 min delay segment
        if (stat.delay_5min > 0) {
            const width = (stat.delay_5min / total * 100).toFixed(1);
            html += `<div style="width: ${width}%; height: 100%; background-color: #8BC34A; float: left;" title="≤5 min: ${stat.delay_5min} (${stat.delay_5min_percentage.toFixed(1)}%)"></div>`;
        }
        
        // 5-15 min delay segment
        if (stat.delay_15min > 0) {
            const width = (stat.delay_15min / total * 100).toFixed(1);
            html += `<div style="width: ${width}%; height: 100%; background-color: #FFEB3B; float: left;" title="≤15 min: ${stat.delay_15min} (${stat.delay_15min_percentage.toFixed(1)}%)"></div>`;
        }
        
        // 15-45 min delay segment
        if (stat.delay_45min > 0) {
            const width = (stat.delay_45min / total * 100).toFixed(1);
            html += `<div style="width: ${width}%; height: 100%; background-color: #FF9800; float: left;" title="≤45 min: ${stat.delay_45min} (${stat.delay_45min_percentage.toFixed(1)}%)"></div>`;
        }
        
        // Over 45 min delay segment
        if (stat.delay_over_45min > 0) {
            const width = (stat.delay_over_45min / total * 100).toFixed(1);
            html += `<div style="width: ${width}%; height: 100%; background-color: #F44336; float: left;" title=">45 min: ${stat.delay_over_45min} (${stat.delay_over_45min_percentage.toFixed(1)}%)"></div>`;
        }
        
        html += '</div>';
        return html;
      }

      async function loadLineStats() {
        try {
          const response = await fetch("/api/stats?split_by_line=true");
          const lineStats = await response.json();

          // Séparer les statistiques par direction
          const compiegneToParis = lineStats.filter(
            (stat) => stat.direction === "Compiègne → Paris Nord",
          );
          const parisToCompiegne = lineStats.filter(
            (stat) => stat.direction === "Paris Nord → Compiègne",
          );

          let html = "<h2>Statistiques par ligne de train</h2>";

          // Générer les tableaux en utilisant la fonction commune
          html += generateTableHTML(compiegneToParis, "Compiègne → Paris Nord");
          html += "<br>";
          html += generateTableHTML(parisToCompiegne, "Paris Nord → Compiègne");

          document.getElementById("line-stats").innerHTML = html;
        } catch (error) {
          console.error(
            "Erreur lors du chargement des statistiques par ligne:",
            error,
          );
        }
      }

      async function loadTimestamp() {
        try {
          const response = await fetch("/api/latest-timestamp");
          const timestamp = await response.json();

          let html =
            "<p><strong>Dernière mise à jour des données :</strong> le " +
            timestamp.fetch_timestamp +
            " — " +
            timestamp.row_count +
            " trajets récupérés pour la journée du " +
            timestamp.data_date +
            "</p>";

          if (timestamp.is_outdated) {
            document.getElementById("timestamp").style.color = "red";
          } else {
            document.getElementById("timestamp").style.color = "#666";
          }

          document.getElementById("timestamp").innerHTML = html;
        } catch (error) {
          console.error(
            "Erreur lors du chargement de la date de dernière mise à jour :",
            error,
          );
        }
      }

      window.onload = function () {
        loadStats();
        loadLineStats();
        loadTimestamp();
      };
    </script>
  </body>
</html>
