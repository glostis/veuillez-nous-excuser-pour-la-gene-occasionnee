<!doctype html>
<html>
  <head>
    <title>Veuillez nous excuser pour la gêne occasionnée</title>
    <link rel="icon" href="/static/ter.png" type="image/png" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      h1 {
        color: #333;
      }
      .stats-container {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
      }
      .stat-box {
        border: 1px solid #ddd;
        padding: 15px;
        border-radius: 5px;
        flex: 1;
      }
      .stat-box h3 {
        margin-top: 0;
      }
      .stat-value {
        font-size: 24px;
        font-weight: bold;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }
      th {
        background-color: #f2f2f2;
      }
      tr:nth-child(even) {
        background-color: #f9f9f9;
      }
      .header-with-logo {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
      }
      .ter-logo {
        height: 60px;
      }
      
      /* Theme system */
      :root {
        --color-background: #ffffff;
        --color-text: #333333;
        --color-border: #dddddd;
        --color-stat-box-bg: #f9f9f9;
        --color-table-header: #f2f2f2;
        --color-table-even: #f9f9f9;
        
        --chart-color-on-time: #4CAF50;
        --chart-color-delay-5min: #8BC34A;
        --chart-color-delay-15min: #FFEB3B;
        --chart-color-delay-45min: #FF9800;
        --chart-color-delay-over-45min: #F44336;
      }
      
      .dark-theme {
        --color-background: #1a1a1a;
        --color-text: #e0e0e0;
        --color-border: #333333;
        --color-stat-box-bg: #2d2d2d;
        --color-table-header: #252525;
        --color-table-even: #2d2d2d;
        
        --chart-color-on-time: #66BB6A;
        --chart-color-delay-5min: #9CCC65;
        --chart-color-delay-15min: #FFEE58;
        --chart-color-delay-45min: #FFB74D;
        --chart-color-delay-over-45min: #EF9A9A;
      }
      
      body {
        background-color: var(--color-background);
        color: var(--color-text);
        transition: background-color 0.3s, color 0.3s;
      }
      
      .stat-box {
        border-color: var(--color-border);
        background-color: var(--color-stat-box-bg);
      }
      
      th {
        background-color: var(--color-table-header);
        color: var(--color-text);
      }
      
      tr:nth-child(even) {
        background-color: var(--color-table-even);
      }
      
      table {
        border-color: var(--color-border);
      }
      
      th, td {
        border-color: var(--color-border);
        color: var(--color-text);
      }
      
      /* Chart colors - these will be protected from Dark Reader */
      [data-chart-segment="on-time"] {
        background-color: var(--chart-color-on-time) !important;
      }
      [data-chart-segment="delay-5min"] {
        background-color: var(--chart-color-delay-5min) !important;
      }
      [data-chart-segment="delay-15min"] {
        background-color: var(--chart-color-delay-15min) !important;
      }
      [data-chart-segment="delay-45min"] {
        background-color: var(--chart-color-delay-45min) !important;
      }
      [data-chart-segment="delay-over-45min"] {
        background-color: var(--chart-color-delay-over-45min) !important;
      }
      
      /* Legend colors */
      .chart-legend span {
        color: var(--color-text) !important;
      }
      
      /* Theme toggle button */
      .theme-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
        background-color: var(--color-stat-box-bg);
        border: 1px solid var(--color-border);
        color: var(--color-text);
        padding: 8px 12px;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s;
      }
      
      .theme-toggle:hover {
        opacity: 0.8;
      }
      
      /* Dark Reader detection message */
      .dark-reader-warning {
        background-color: #FFCDD2;
        color: #C62828;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
        display: none;
      }
      
      .dark-reader-warning.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="header-with-logo">
      <img src="/static/ter.png" alt="TER HDF Logo" class="ter-logo" />
      <div>
        <h1>Veuillez nous excuser pour la gêne occasionnée</h1>
        <p>
          <i
            >Analyse des retards de trains sur les lignes TER HDF Compiègne ↔
            Paris Gare du Nord</i
          >
        </p>
      </div>
    </div>

    <div class="dark-reader-warning" id="dark-reader-warning">
      <strong>⚠️ Dark Reader détecté :</strong> Cette page a son propre thème sombre intégré. 
      Pour une meilleure expérience, nous vous recommandons de désactiver Dark Reader pour ce site. 
      <button id="disable-dark-reader-btn" style="margin-left: 10px; padding: 5px 10px; background: #C62828; color: white; border: none; border-radius: 3px; cursor: pointer;">Désactiver Dark Reader</button>
    </div>

    <button class="theme-toggle" id="theme-toggle">🌙 Thème sombre</button>

    <div id="stats"></div>
    <div id="line-stats"></div>
    <div
      id="timestamp"
      style="margin-top: 20px; font-size: 14px; color: var(--color-text)"
    ></div>

    <script>
      async function loadStats() {
        try {
          const response = await fetch("/api/stats");
          const stats = await response.json();

          let html = "<h2>Statistiques globales</h2>";
          html += '<div class="stats-container">';
          html += `<div class="stat-box">
                    <h3>Total des trains</h3>
                    <div class="stat-value">${stats.total_trains}</div>
                </div>`;
          html += `<div class="stat-box">
                    <h3>À l'heure</h3>
                    <div class="stat-value">${stats.on_time} (${stats.on_time_percentage.toFixed(1)}%)</div>
                </div>`;
          html += `<div class="stat-box">
                    <h3>≤5 min de retard</h3>
                    <div class="stat-value">${stats.delay_5min} (${stats.delay_5min_percentage.toFixed(1)}%)</div>
                </div>`;
          html += `<div class="stat-box">
                    <h3>≤15 min de retard</h3>
                    <div class="stat-value">${stats.delay_15min} (${stats.delay_15min_percentage.toFixed(1)}%)</div>
                </div>`;
          html += `<div class="stat-box">
                    <h3>≤45 min de retard</h3>
                    <div class="stat-value">${stats.delay_45min} (${stats.delay_45min_percentage.toFixed(1)}%)</div>
                </div>`;
          html += `<div class="stat-box">
                    <h3>>45 min de retard</h3>
                    <div class="stat-value">${stats.delay_over_45min} (${stats.delay_over_45min_percentage.toFixed(1)}%)</div>
                </div>`;
          html += "</div>";

          document.getElementById("stats").innerHTML = html;
        } catch (error) {
          console.error("Erreur lors du chargement des statistiques:", error);
        }
      }

      function generateTableHTML(stats, title) {
        let html = `<h3>${title}</h3>`;
        html += "<table>";
        html +=
          "<tr><th>Ligne de train</th><th>Départ</th><th>Total</th><th>À l'heure</th><th>≤5 min</th><th>≤15 min</th><th>≤45 min</th><th>>45 min</th><th>Retard moyen</th><th>Visualisation</th></tr>";

        stats.forEach((stat) => {
          html += `<tr>
                      <td>${stat.line}</td>
                      <td>${stat.departure_time}</td>
                      <td>${stat.total_trains}</td>
                      <td>${stat.on_time} (${stat.on_time_percentage.toFixed(1)}%)</td>
                      <td>${stat.delay_5min} (${stat.delay_5min_percentage.toFixed(1)}%)</td>
                      <td>${stat.delay_15min} (${stat.delay_15min_percentage.toFixed(1)}%)</td>
                      <td>${stat.delay_45min} (${stat.delay_45min_percentage.toFixed(1)}%)</td>
                      <td>${stat.delay_over_45min} (${stat.delay_over_45min_percentage.toFixed(1)}%)</td>
                      <td>${stat.average_delay_minutes.toFixed(1)} min</td>
                      <td>${generateInlineChartHTML(stat)}</td>
                  </tr>`;
        });

        html += "</table>";
        
        // Add legend below the table
        html += '<div class="chart-legend" style="margin-top: 10px; font-size: 12px;">';
        html += '<strong>Légende:</strong> ';
        html += '<span style="color: #4CAF50;">■ À l\'heure</span> | ';
        html += '<span style="color: #8BC34A;">■ ≤5 min</span> | ';
        html += '<span style="color: #FFEB3B;">■ ≤15 min</span> | ';
        html += '<span style="color: #FF9800;">■ ≤45 min</span> | ';
        html += '<span style="color: #F44336;">■ >45 min</span>';
        html += '</div>';
        
        return html;
      }

      function generateInlineChartHTML(stat) {
        const total = stat.total_trains;
        if (total === 0) return '';
        
        let html = '<div style="width: 150px; height: 15px; position: relative; border: 1px solid var(--color-border); border-radius: 3px; overflow: hidden;">';
        
        // On time segment
        if (stat.on_time > 0) {
            const width = (stat.on_time / total * 100).toFixed(1);
            html += `<div data-chart-segment="on-time" style="width: ${width}%; height: 100%; float: left;" title="À l'heure: ${stat.on_time} (${stat.on_time_percentage.toFixed(1)}%)"></div>`;
        }
        
        // 0-5 min delay segment
        if (stat.delay_5min > 0) {
            const width = (stat.delay_5min / total * 100).toFixed(1);
            html += `<div data-chart-segment="delay-5min" style="width: ${width}%; height: 100%; float: left;" title="≤5 min: ${stat.delay_5min} (${stat.delay_5min_percentage.toFixed(1)}%)"></div>`;
        }
        
        // 5-15 min delay segment
        if (stat.delay_15min > 0) {
            const width = (stat.delay_15min / total * 100).toFixed(1);
            html += `<div data-chart-segment="delay-15min" style="width: ${width}%; height: 100%; float: left;" title="≤15 min: ${stat.delay_15min} (${stat.delay_15min_percentage.toFixed(1)}%)"></div>`;
        }
        
        // 15-45 min delay segment
        if (stat.delay_45min > 0) {
            const width = (stat.delay_45min / total * 100).toFixed(1);
            html += `<div data-chart-segment="delay-45min" style="width: ${width}%; height: 100%; float: left;" title="≤45 min: ${stat.delay_45min} (${stat.delay_45min_percentage.toFixed(1)}%)"></div>`;
        }
        
        // Over 45 min delay segment
        if (stat.delay_over_45min > 0) {
            const width = (stat.delay_over_45min / total * 100).toFixed(1);
            html += `<div data-chart-segment="delay-over-45min" style="width: ${width}%; height: 100%; float: left;" title=">45 min: ${stat.delay_over_45min} (${stat.delay_over_45min_percentage.toFixed(1)}%)"></div>`;
        }
        
        html += '</div>';
        return html;
      }

      async function loadLineStats() {
        try {
          const response = await fetch("/api/stats?split_by_line=true");
          const lineStats = await response.json();

          // Séparer les statistiques par direction
          const compiegneToParis = lineStats.filter(
            (stat) => stat.direction === "Compiègne → Paris Nord",
          );
          const parisToCompiegne = lineStats.filter(
            (stat) => stat.direction === "Paris Nord → Compiègne",
          );

          let html = "<h2>Statistiques par ligne de train</h2>";

          // Générer les tableaux en utilisant la fonction commune
          html += generateTableHTML(compiegneToParis, "Compiègne → Paris Nord");
          html += "<br>";
          html += generateTableHTML(parisToCompiegne, "Paris Nord → Compiègne");

          document.getElementById("line-stats").innerHTML = html;
        } catch (error) {
          console.error(
            "Erreur lors du chargement des statistiques par ligne:",
            error,
          );
        }
      }

      async function loadTimestamp() {
        try {
          const response = await fetch("/api/latest-timestamp");
          const timestamp = await response.json();

          let html =
            "<p><strong>Dernière mise à jour des données :</strong> le " +
            timestamp.fetch_timestamp +
            " — " +
            timestamp.row_count +
            " trajets récupérés pour la journée du " +
            timestamp.data_date +
            "</p>";

          if (timestamp.is_outdated) {
            document.getElementById("timestamp").style.color = "red";
          } else {
            document.getElementById("timestamp").style.color = "#666";
          }

          document.getElementById("timestamp").innerHTML = html;
        } catch (error) {
          console.error(
            "Erreur lors du chargement de la date de dernière mise à jour :",
            error,
          );
        }
      }

      // Simplified Dark Reader detection
      function detectDarkReader() {
        // Check for Dark Reader HTML attributes
        return document.documentElement.hasAttribute('data-darkreader-scheme') ||
               document.documentElement.hasAttribute('data-darkreader-mode');
      }

      // Theme management
      function applyTheme(theme) {
        if (theme === 'dark') {
          document.body.classList.add('dark-theme');
          document.getElementById('theme-toggle').textContent = '☀️ Thème clair';
          localStorage.setItem('theme', 'dark');
        } else if (theme === 'light') {
          document.body.classList.remove('dark-theme');
          document.getElementById('theme-toggle').textContent = '🌙 Thème sombre';
          localStorage.setItem('theme', 'light');
        } else { // system
          document.body.classList.remove('dark-theme');
          document.getElementById('theme-toggle').textContent = '💻 Thème système';
          localStorage.removeItem('theme');
          // Apply system preference immediately
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (prefersDark) {
            document.body.classList.add('dark-theme');
          }
        }
      }

      // Toggle theme (cycle through light -> dark -> system)
      function toggleTheme() {
        const currentTheme = document.body.classList.contains('dark-theme') ? 'dark' : 'light';
        const savedTheme = localStorage.getItem('theme');
        
        if (savedTheme === 'dark') {
          applyTheme('system');
        } else if (savedTheme === 'light') {
          applyTheme('dark');
        } else {
          applyTheme('light');
        }
      }

      // Check for Dark Reader and show warning
      function checkDarkReader() {
        if (detectDarkReader()) {
          document.getElementById('dark-reader-warning').classList.add('show');
          
          // Add event listener to disable Dark Reader button
          document.getElementById('disable-dark-reader-btn').addEventListener('click', function() {
            alert('Pour désactiver Dark Reader pour ce site:\n1. Cliquez sur l\'icône Dark Reader dans votre barre d\'outils\n2. Sélectionnez "Désactiver pour ce site"\n3. Actualisez la page');
          });
        }
      }

      // Simple and reliable system theme change listener
      function setupSystemThemeListener() {
        const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        
        // Function to handle theme changes
        function handleThemeChange(e) {
          if (!localStorage.getItem('theme')) {
            // When in system mode, apply the system preference
            if (e.matches) {
              document.body.classList.add('dark-theme');
            } else {
              document.body.classList.remove('dark-theme');
            }
          }
        }
        
        // Use the modern addEventListener method which works in all current browsers
        if (mediaQuery.addEventListener) {
          mediaQuery.addEventListener('change', handleThemeChange);
        } else {
          // Fallback for very old browsers (not really needed for current Firefox/Chrome)
          mediaQuery.addListener(handleThemeChange);
        }
        
        return mediaQuery;
      }

      window.onload = function () {
        loadStats();
        loadLineStats();
        loadTimestamp();
        
        // Initialize theme
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme) {
          applyTheme(savedTheme);
        } else if (prefersDark) {
          applyTheme('dark');
        }
        
        // Set up theme toggle button
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
        
        // Check for Dark Reader
        checkDarkReader();
        
        // Set up system theme change listener
        setupSystemThemeListener();
      };
    </script>
  </body>
</html>
